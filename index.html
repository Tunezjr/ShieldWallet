<!DOCTYPE html>
<html>
<head>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0c0c;color:#f0f0f0;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:32px;min-height:100vh}
:root{--g:#a3e635;--m:#555;--b:#222;--r:#f87171;--a:#fbbf24}

h2{font-size:14px;letter-spacing:.1em;color:var(--g);margin-bottom:24px;text-transform:uppercase}

.addr-row{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;margin-bottom:32px}
.addr-box{background:#141414;border:1px solid #262626;border-radius:8px;padding:16px}
.addr-lbl{font-size:9px;color:var(--m);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.addr-val{font-size:10px;color:#f0f0f0;word-break:break-all;line-height:1.6}
.arrow-mid{text-align:center;color:var(--m);font-size:22px}

.amount-row{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.amount-lbl{font-size:9px;color:var(--m);letter-spacing:.12em;text-transform:uppercase;white-space:nowrap}
input[type=number]{background:#141414;border:1px solid #262626;border-radius:5px;padding:9px 12px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#f0f0f0;outline:none;width:160px}
input[type=number]:focus{border-color:var(--g)}
.mon-lbl{font-size:11px;color:var(--m)}
button{background:var(--g);color:#0c0c0c;border:none;border-radius:5px;padding:9px 20px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;cursor:pointer;letter-spacing:.04em;transition:.15s}
button:hover{background:#bef264}
button:disabled{background:#2a2a2a;color:#555;cursor:not-allowed}

/* TRACE */
.trace{margin-top:8px}
.step{display:grid;grid-template-columns:28px 1fr;gap:12px;align-items:start;padding:14px 0;border-bottom:1px solid #1a1a1a;opacity:0;transform:translateY(6px);transition:all .35s}
.step:last-child{border-bottom:none}
.step.show{opacity:1;transform:translateY(0)}
.snum{width:24px;height:24px;border-radius:50%;background:var(--g);color:#0c0c0c;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.stitle{font-size:12px;font-weight:600;margin-bottom:5px;color:#f0f0f0}
.sdetail{font-size:10px;color:#666;line-height:1.8}
.hi{color:#06b6d4}
.ok{color:var(--g)}
.warn{color:var(--r)}
.am{color:var(--a)}

.final{background:rgba(163,230,53,.08);border:1px solid rgba(163,230,53,.2);border-radius:8px;padding:16px;margin-top:20px;opacity:0;transition:all .4s}
.final.show{opacity:1}
.final-title{font-size:11px;color:var(--g);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.final-row{display:flex;justify-content:space-between;font-size:10px;padding:4px 0;border-bottom:1px solid rgba(163,230,53,.1)}
.final-row:last-child{border-bottom:none}
.fk{color:#666}
.fv{color:#f0f0f0;word-break:break-all;max-width:320px;text-align:right;line-height:1.5}
.fv.g{color:var(--g)}
</style>
</head>
<body>

<h2>⬡ ShieldWallet — Transaction Simulation</h2>

<div class="addr-row">
  <div class="addr-box">
    <div class="addr-lbl">From (Your Wallet)</div>
    <div class="addr-val">0xbea9776143CAa8091e8Bb7CDAb357a5a9A6aD4E0</div>
  </div>
  <div class="arrow-mid">→</div>
  <div class="addr-box">
    <div class="addr-lbl">To (Recipient)</div>
    <div class="addr-val">0x447d3809aB984e75431854432f9d7b9325112E07</div>
  </div>
</div>

<div class="amount-row">
  <span class="amount-lbl">Amount</span>
  <input type="number" id="amt" value="250" min="0.001" step="1" />
  <span class="mon-lbl">MON</span>
  <button id="simBtn" onclick="simulate()">Simulate Send</button>
</div>

<div class="trace" id="trace"></div>

<script>
const FROM = '0xbea9776143CAa8091e8Bb7CDAb357a5a9A6aD4E0';
const TO   = '0x447d3809aB984e75431854432f9d7b9325112E07';
const WALLET_BAL = 12450; // simulated balance
const RESERVE = 10;

function rh(n){return '0x'+Array.from({length:n},()=>Math.floor(Math.random()*16).toString(16)).join('')}
function short(a){return a.slice(0,10)+'...'+a.slice(-6)}

function simulate(){
  const amt = parseFloat(document.getElementById('amt').value)||0;
  const btn = document.getElementById('simBtn');
  const trace = document.getElementById('trace');

  if(amt<=0){trace.innerHTML='<div style="color:var(--r);font-size:11px">Amount must be greater than 0.</div>';return;}
  if(amt > WALLET_BAL - RESERVE){
    trace.innerHTML=`<div style="color:var(--r);font-size:11px">✗ Revert: would breach 10 MON reserve.<br>Max sendable: ${(WALLET_BAL-RESERVE).toLocaleString()} MON</div>`;
    return;
  }

  btn.disabled=true;
  trace.innerHTML='';

  const nonce = Math.floor(Math.random()*9999999);
  const salt = rh(64);
  const aliasAddr = rh(40);
  const txHash = rh(64);
  const remaining = WALLET_BAL - amt;

  const steps = [
    {
      title: 'EOA calls shieldedSend() on itself',
      detail: `<span class="hi">from:</span> ${short(FROM)}<br>
               <span class="hi">to:</span> ${short(FROM)} <span style="color:#444">(self-call via EIP-7702)</span><br>
               <span class="hi">fn:</span> shieldedSend(${short(TO)}, ${amt.toLocaleString()} MON)<br>
               <span class="hi">tx type:</span> 0x02 (EIP-1559)`
    },
    {
      title: 'ShieldWallet enforces 10 MON Monad reserve',
      detail: `wallet balance: <span class="am">${WALLET_BAL.toLocaleString()} MON</span><br>
               amount + reserve: <span class="am">${amt} + ${RESERVE} = ${(amt+RESERVE).toLocaleString()} MON</span><br>
               <span class="ok">✓ check passed — ${remaining.toLocaleString()} MON remains after send</span>`
    },
    {
      title: 'Derive unique salt from nonce',
      detail: `keccak256(<br>
               &nbsp;&nbsp;<span class="hi">${short(FROM)}</span> ∥ <span class="hi">${short(TO)}</span> ∥ <span class="am">${amt} MON</span> ∥ <span class="hi">nonce #${nonce}</span><br>
               )<br>
               salt: <span class="hi">${salt.slice(0,18)}...${salt.slice(-8)}</span>`
    },
    {
      title: 'ShieldWallet → AliasFactory.deployAndForward()',
      detail: `AliasFactory.deployAndForward{value: <span class="am">${amt.toLocaleString()} MON</span>}(<br>
               &nbsp;&nbsp;recipient: <span class="hi">${short(TO)}</span>,<br>
               &nbsp;&nbsp;salt: <span class="hi">${salt.slice(0,18)}...${salt.slice(-8)}</span><br>
               )<br>
               <span style="color:#444">Note: ShieldWallet delegates to factory because</span><br>
               <span style="color:#444">delegated EOA code cannot call CREATE2 on Monad</span>`
    },
    {
      title: 'AliasFactory CREATE2 deploys AliasProxy',
      detail: `new address: <span class="hi">${aliasAddr}</span><br>
               prior txs at this address: <span class="ok">0</span><br>
               prior balance: <span class="ok">0 MON</span><br>
               <span class="ok">✓ completely fresh — no history, no identity</span><br>
               constructor receives <span class="am">${amt.toLocaleString()} MON</span>`
    },
    {
      title: 'AliasProxy constructor forwards to recipient',
      detail: `<span class="hi">${aliasAddr.slice(0,10)}...${aliasAddr.slice(-6)}</span> → <span class="hi">${short(TO)}</span><br>
               forwarded: <span class="am">${amt.toLocaleString()} MON</span><br>
               alias balance after: <span class="ok">0 MON</span><br>
               tx hash: <span style="color:#444">${txHash.slice(0,18)}...${txHash.slice(-8)}</span>`
    },
  ];

  steps.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='step';
    el.innerHTML=`<div class="snum">${i+1}</div><div><div class="stitle">${s.title}</div><div class="sdetail">${s.detail}</div></div>`;
    trace.appendChild(el);
    setTimeout(()=>el.classList.add('show'), i*320+100);
  });

  // Final summary
  setTimeout(()=>{
    const fin=document.createElement('div');
    fin.className='final';
    fin.innerHTML=`<div class="final-title">✓ What the block explorer shows</div>
      <div class="final-row"><span class="fk">Visible sender</span><span class="fv g">${aliasAddr} (fresh alias)</span></div>
      <div class="final-row"><span class="fk">Recipient</span><span class="fv">${short(TO)}</span></div>
      <div class="final-row"><span class="fk">Amount</span><span class="fv">${amt.toLocaleString()} MON</span></div>
      <div class="final-row"><span class="fk">Your wallet exposed?</span><span class="fv g">No — ${short(FROM)} is tx origin, not the visible sender</span></div>
      <div class="final-row"><span class="fk">Your balance exposed?</span><span class="fv g">No — alias had 0 history and 0 remaining balance</span></div>
    `;
    trace.appendChild(fin);
    setTimeout(()=>fin.classList.add('show'),100);
    btn.disabled=false;
  }, steps.length*320+300);
}
</script>
</body>
</html>
